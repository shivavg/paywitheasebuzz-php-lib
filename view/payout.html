<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Payout API</title>
</head>

<body>
    <div class="grid-container">
        <header class="wrapper">
            <div class="logo">
                <a href="../index.html">
                    <img src="../assets/images/Easebuzz_Logo_ White_Text.svg" alt="Easebuzz">
                </a>
            </div>
            <div class="hedding">
                <h2><a class="highlight" href="../index.html">Back</a></h2>
            </div>
        </header>
    </div>

    <div class="form-container">
        <h2><a href="https://docs.easebuzz.in/docs/payment-gateway/k0ynpfmhx3x0y-settlement-api"
                target="_blank" style="color:#ce042c;text-decoration:none;"
                onmouseover="this.style.textDecoration='underline'"
                onmouseout="this.style.textDecoration='none'">PAYOUT API &#x2197;</a></h2>
        <hr>
        <form method="POST" action="../easebuzz.php?api_name=payout">
            <div class="main-form">
                <h3>Mandatory Parameters</h3>
                <hr>
                <div class="mandatory-data">
                    <div class="form-field">
                        <label for="start_date">Start Date<sup>*</sup></label>
                        <input id="start_date" name="start_date" placeholder="DD-MM-YYYY" required
                            pattern="^\d{2}-\d{2}-\d{4}$"
                            title="Date format: DD-MM-YYYY">
                    </div>

                    <div class="form-field">
                        <label for="end_date">End Date<sup>*</sup></label>
                        <input id="end_date" name="end_date" placeholder="DD-MM-YYYY" required
                            pattern="^\d{2}-\d{2}-\d{4}$"
                            title="Date format: DD-MM-YYYY">
                    </div>
                </div>

                <h3>Optional Parameters</h3>
                <hr>
                <div class="optional-data">
                    <div class="form-field">
                        <label for="merchant_email">Merchant Email</label>
                        <input id="merchant_email" name="merchant_email" type="email"
                            placeholder="merchant@easebuzz.in">
                    </div>

                    <div class="form-field">
                        <label for="sub_merchant_id">Sub-Merchant ID</label>
                        <input id="sub_merchant_id" name="sub_merchant_id" placeholder="SUB001"
                            pattern="^[a-zA-Z0-9\-]{0,15}$">
                    </div>
                </div>

                <div class="btn-submit">
                    <button type="submit">Submit</button>
                </div>
            </div>
        </form>
    </div>
    <script src="../assets/js/form-validation.js"></script>
</body>

</html>
