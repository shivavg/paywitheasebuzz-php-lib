<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Initiate Seamless Payment API</title>
    <style>
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-label {
            color: #000;
            font-size: 0.9em;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #4CAF50;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }

        .seamless-field {
            display: none;
        }

        .seamless-field.visible {
            display: block;
        }

        #payment_mode {
            border: 1px solid;
            border-radius: 5px;
            padding: 7px 5px;
            font-size: 1em;
            margin: 5px 10px 5px 0px;
            min-width: 100%;
            background-color: #fff;
        }
    </style>
</head>

<body>
    <div class="grid-container">
        <header class="wrapper">
            <div class="logo">
                <a href="../index.html">
                    <img src="../assets/images/Easebuzz_Logo_ White_Text.svg" alt="Easebuzz">
                </a>
            </div>
            <div class="hedding">
                <h2>
                    <span style="margin-right:20px;">
                        <span class="toggle-container" style="display:inline-flex;">
                            <span class="toggle-label">Auto Fill Data</span>
                            <label class="switch">
                                <input type="checkbox" id="autoFillToggle">
                                <span class="slider" id="autoFillSlider"></span>
                            </label>
                        </span>
                    </span>
                    <a class="highlight" href="../index.html">Back</a>
                </h2>
            </div>
        </header>

        <div class="form-container">
            <h2><a href="https://docs.easebuzz.in/docs/payment-gateway/k3ho860cy66zh-seamless-integration-merchant-hosted"
                    target="_blank" style="color:#000;text-decoration:none;"
                    onmouseover="this.style.textDecoration='underline'"
                    onmouseout="this.style.textDecoration='none'">INITIATE SEAMLESS PAYMENT API &#x2197;</a></h2>
            <hr>
            <form name="seamlessPaymentForm" method="POST" action="../easebuzz.php?api_name=initiate_seamless_payment">
                <div class="main-form">
                    <h3>Mandatory Parameters</h3>
                    <hr>
                    <div class="mandatory-data">
                        <div class="form-field">
                            <label for="request_flow">Request Flow<sup>*</sup></label>
                            <input id="request_flow_display" value="SEAMLESS" disabled>
                            <input type="hidden" id="request_flow" name="request_flow" value="SEAMLESS">
                        </div>

                        <div class="form-field">
                            <label for="txnid">Transaction ID<sup>*</sup></label>
                            <input id="txnid" name="txnid" placeholder="T31Q6JT8HB" required
                                pattern="^[a-zA-Z0-9_|\-/]{1,40}$"
                                title="Only alphanumeric, _, |, -, / allowed. Max 40 chars.">
                        </div>

                        <div class="form-field">
                            <label for="amount">Amount<sup>(should be float)*</sup></label>
                            <input id="amount" name="amount" placeholder="125.25" required
                                title="Amount must be a number with decimal (e.g., 125.0). Must be >= 1.">
                        </div>

                        <div class="form-field">
                            <label for="firstname">First Name<sup>*</sup></label>
                            <input id="firstname" name="firstname" placeholder="Easebuzz Pvt. Ltd." required
                                pattern="^[a-zA-Z0-9&amp;'\-._ ()/,@]{1,150}$"
                                title="Only alphanumeric and &amp;'-._()/,@ allowed. Max 150 chars.">
                        </div>

                        <div class="form-field">
                            <label for="email">Email ID<sup>*</sup></label>
                            <input id="email" name="email" type="email" placeholder="initiate.payment@easebuzz.in"
                                required title="Enter a valid email address.">
                        </div>

                        <div class="form-field">
                            <label for="phone">Phone<sup>*</sup></label>
                            <input id="phone" name="phone" placeholder="0123456789" required
                                pattern="^(\+\d{1,4}[-]?)?\d{5,20}$"
                                title="Valid phone number. 5-20 digits, optional country code.">
                        </div>

                        <div class="form-field">
                            <label for="productinfo">Product Information<sup>*</sup></label>
                            <input id="productinfo" name="productinfo" placeholder="Apple Laptop" required
                                pattern="^[a-zA-Z0-9\-\s|\-]{1,45}$"
                                title="Only alphanumeric, spaces, - and | allowed. Max 45 chars.">
                        </div>

                        <div class="form-field">
                            <label for="surl">Success URL<sup>*</sup></label>
                            <input id="surl" name="surl" value="" placeholder="http://localhost:3000/response.php"
                                required pattern="^https?://.*"
                                title="Enter a valid URL starting with http:// or https://">
                        </div>

                        <div class="form-field">
                            <label for="furl">Failure URL<sup>*</sup></label>
                            <input id="furl" name="furl" value="" placeholder="http://localhost:3000/response.php"
                                required pattern="^https?://.*"
                                title="Enter a valid URL starting with http:// or https://">
                        </div>
                    </div>

                    <h3>Seamless API</h3>
                    <hr>
                    <div class="mandatory-data" id="seamless_api_section">
                        <div class="form-field">
                            <label for="payment_mode">Payment Mode<sup>*</sup></label>
                            <select id="payment_mode" name="payment_mode" required>
                                <option value="">-- Select Payment Mode --</option>
                                <option value="NB">NB (Net Banking)</option>
                                <option value="DC">DC (Debit Card)</option>
                                <option value="CC">CC (Credit Card)</option>
                                <option value="MW">MW (Mobile Wallet)</option>
                                <option value="UPI">UPI (UPI)</option>
                                <option value="OM">OM (Ola Money)</option>
                                <option value="PL">PL (Pay Later)</option>
                                <option value="EMI">EMI</option>
                            </select>
                        </div>

                        <!-- Conditional fields based on payment_mode -->
                        <div class="form-field seamless-field" id="request_mode_field">
                            <label for="request_mode">Request Mode</label>
                            <input id="request_mode_display" value="SUVA" disabled>
                            <input type="hidden" id="request_mode" name="request_mode" value="SUVA">
                        </div>

                        <div class="form-field seamless-field" id="bank_code_field">
                            <label for="bank_code">Bank Code<sup>*</sup></label>
                            <input id="bank_code" name="bank_code" placeholder="Enter Bank Code">
                        </div>

                        <div class="form-field seamless-field" id="card_number_field">
                            <label for="card_number">Card Number<sup>*</sup></label>
                            <input id="card_number" name="card_number" placeholder="4111111111111111"
                                pattern="^[0-9\s]{13,19}$" maxlength="19"
                                title="Enter a valid card number (13-19 digits)">
                        </div>

                        <div class="form-field seamless-field" id="card_holder_name_field">
                            <label for="card_holder_name">Card Holder Name<sup>*</sup></label>
                            <input id="card_holder_name" name="card_holder_name"
                                placeholder="Enter Card Holder Name"
                                pattern="^[a-zA-Z\s.]{2,50}$"
                                title="Only alphabets, spaces and dots allowed. Max 50 chars.">
                        </div>

                        <div class="form-field seamless-field" id="card_cvv_field">
                            <label for="card_cvv">Card CVV<sup>*</sup></label>
                            <input id="card_cvv" name="card_cvv" placeholder="123"
                                pattern="^[0-9]{3,4}$" maxlength="4"
                                title="Enter 3 or 4 digit CVV">
                        </div>

                        <div class="form-field seamless-field" id="card_expiry_date_field">
                            <label for="card_expiry_date">Card Expiry Date<sup>*</sup> (MM/YY)</label>
                            <input id="card_expiry_date" name="card_expiry_date" placeholder="MM/YY"
                                maxlength="5"
                                pattern="^(0[1-9]|1[0-2])\/[0-9]{2}$" title="Format: MM/YY">
                        </div>

                        <div class="form-field seamless-field" id="upi_qr_field">
                            <label for="upi_qr">UPI QR<sup>*</sup></label>
                            <input id="upi_qr" name="upi_qr" placeholder="true">
                        </div>

                        <div class="form-field seamless-field" id="pay_later_app_field">
                            <label for="pay_later_app">Pay Later App<sup>*</sup></label>
                            <input id="pay_later_app" name="pay_later_app" placeholder="Simpl" value="Simpl"
                                readonly>
                        </div>

                        <div class="form-field seamless-field" id="emi_object_field">
                            <label for="emi_object">EMI Object (JSON)<sup>*</sup></label>
                            <input id="emi_object" name="emi_object"
                                placeholder='{"emi_tenure": 3, "emi_bank": "HDFC"}'>
                        </div>
                    </div>

                    <h3>Optional Parameters</h3>
                    <hr>

                    <h4 style="color:#555;margin-top:15px;">Address Details</h4>
                    <div class="optional-data">
                        <div class="form-field">
                            <label for="address1">Address 1</label>
                            <input id="address1" name="address1" placeholder="#250, Main 5th cross,"
                                pattern="^[a-zA-Z.0-9/,\s_#@()&amp;|:\-]{1,100}$">
                        </div>

                        <div class="form-field">
                            <label for="address2">Address 2</label>
                            <input id="address2" name="address2" placeholder="Saket nagar, Pune"
                                pattern="^[a-zA-Z.0-9/,\s_#@()&amp;|:\-]{1,100}$">
                        </div>

                        <div class="form-field">
                            <label for="city">City</label>
                            <input id="city" name="city" placeholder="Pune" pattern="^[0-9a-zA-Z_.\s\-]{1,50}$">
                        </div>

                        <div class="form-field">
                            <label for="state">State</label>
                            <input id="state" name="state" placeholder="Maharashtra"
                                pattern="^[0-9a-zA-Z_.\s\-]{1,50}$">
                        </div>

                        <div class="form-field">
                            <label for="country">Country</label>
                            <input id="country" name="country" placeholder="India" pattern="^[0-9a-zA-Z_.\s\-]{1,50}$">
                        </div>

                        <div class="form-field">
                            <label for="zipcode">Zip-Code</label>
                            <input id="zipcode" name="zipcode" placeholder="123456" pattern="^[0-9]{0,6}$">
                        </div>
                    </div>

                    <h4 style="color:#555;margin-top:15px;">UDF (User Defined Fields)</h4>
                    <div class="optional-data">
                        <div class="form-field">
                            <label for="udf1">UDF1</label>
                            <input id="udf1" name="udf1" placeholder="User description1"
                                pattern="^[a-zA-Z.0-9/\\,\s_#@\-=+&amp;]{1,300}$"
                                title="Only alphanumeric and ./,_#@-=+&amp; allowed. Max 300 chars.">
                        </div>

                        <div class="form-field">
                            <label for="udf2">UDF2</label>
                            <input id="udf2" name="udf2" placeholder="User description2"
                                pattern="^[a-zA-Z.0-9/\\,\s_#@\-=+&amp;]{1,300}$"
                                title="Only alphanumeric and ./,_#@-=+&amp; allowed. Max 300 chars.">
                        </div>

                        <div class="form-field">
                            <label for="udf3">UDF3</label>
                            <input id="udf3" name="udf3" placeholder="User description3"
                                pattern="^[a-zA-Z.0-9/\\,\s_#@\-=+&amp;]{1,300}$"
                                title="Only alphanumeric and ./,_#@-=+&amp; allowed. Max 300 chars.">
                        </div>

                        <div class="form-field">
                            <label for="udf4">UDF4</label>
                            <input id="udf4" name="udf4" placeholder="User description4"
                                pattern="^[a-zA-Z.0-9/\\,\s_#@\-=+&amp;]{1,300}$"
                                title="Only alphanumeric and ./,_#@-=+&amp; allowed. Max 300 chars.">
                        </div>

                        <div class="form-field">
                            <label for="udf5">UDF5</label>
                            <input id="udf5" name="udf5" placeholder="User description5"
                                pattern="^[a-zA-Z.0-9/\\,\s_#@\-=+&amp;]{1,300}$"
                                title="Only alphanumeric and ./,_#@-=+&amp; allowed. Max 300 chars.">
                        </div>

                        <div class="form-field">
                            <label for="udf6">UDF6</label>
                            <input id="udf6" name="udf6" placeholder="User description6"
                                pattern="^[a-zA-Z.0-9/\\,\s_#@\-=+&amp;]{1,300}$"
                                title="Only alphanumeric and ./,_#@-=+&amp; allowed. Max 300 chars.">
                        </div>

                        <div class="form-field">
                            <label for="udf7">UDF7</label>
                            <input id="udf7" name="udf7" placeholder="User description7"
                                pattern="^[a-zA-Z.0-9/\\,\s_#@\-=+&amp;]{1,300}$"
                                title="Only alphanumeric and ./,_#@-=+&amp; allowed. Max 300 chars.">
                        </div>
                    </div>

                    <h4 style="color:#555;margin-top:15px;">General</h4>
                    <div class="optional-data">
                        <div class="form-field">
                            <label for="sub_merchant_id">Sub-Merchant ID</label>
                            <input id="sub_merchant_id" name="sub_merchant_id" placeholder="S123ABC"
                                pattern="^[a-zA-Z0-9\-]{0,15}$">
                        </div>

                        <div class="form-field">
                            <label for="unique_id">Unique ID</label>
                            <input id="unique_id" name="unique_id" placeholder="Customer unique Id"
                                pattern="^[a-zA-Z0-9_]{0,40}$">
                        </div>

                        <div class="form-field">
                            <label for="show_payment_mode">Show Payment Mode</label>
                            <input id="show_payment_mode" name="show_payment_mode"
                                placeholder="NB,DC,CC,MW,UPI,OM,EMI,CBT,BT">
                        </div>

                        <div class="form-field">
                            <label for="split_payments">Split Payments</label>
                            <input id="split_payments" name="split_payments"
                                placeholder='{"label_of_bank1": 60, "label_of_bank2": 40}'>
                        </div>
                    </div>
                    <div class="btn-submit">
                        <button type="submit">SUBMIT</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="../assets/js/form-validation.js"></script>
    <script>
        // Auto Fill Toggle
        document.getElementById('autoFillToggle').addEventListener('change', function () {
            var form = document.forms['seamlessPaymentForm'];
            if (this.checked) {
                form.txnid.value = 'TXN' + Math.random().toString(36).substring(2, 10).toUpperCase();
                form.amount.value = '125.50';
                form.firstname.value = 'John Doe';
                form.email.value = 'test@example.com';
                form.phone.value = '9876543210';
                form.productinfo.value = 'Test Product';
                form.surl.value = 'http://localhost:3000/response.php';
                form.furl.value = 'http://localhost:3000/response.php';
            } else {
                var inputs = form.querySelectorAll('input:not([type="hidden"]):not([type="checkbox"]):not([disabled]):not([readonly])');
                for (var i = 0; i < inputs.length; i++) {
                    inputs[i].value = '';
                }
                form.payment_mode.value = '';
                hideAllFields();
            }
        });

        // Payment Mode conditional fields
        var paymentModeSelect = document.getElementById('payment_mode');

        var fieldMap = {
            'NB': ['bank_code_field'],
            'MW': ['bank_code_field'],
            'OM': ['bank_code_field'],
            'DC': ['card_number_field', 'card_holder_name_field', 'card_cvv_field', 'card_expiry_date_field'],
            'CC': ['card_number_field', 'card_holder_name_field', 'card_cvv_field', 'card_expiry_date_field'],
            'EMI': ['card_number_field', 'card_holder_name_field', 'card_cvv_field', 'card_expiry_date_field', 'emi_object_field'],
            'UPI': ['upi_qr_field', 'request_mode_field'],
            'PL': ['pay_later_app_field']
        };

        var allSeamlessFields = document.querySelectorAll('.seamless-field');

        function hideAllFields() {
            allSeamlessFields.forEach(function (field) {
                field.classList.remove('visible');
                var input = field.querySelector('input');
                if (input) {
                    if (input.id !== 'pay_later_app' && input.id !== 'upi_qr' && input.id !== 'request_mode_display') {
                        input.value = '';
                    }
                    input.removeAttribute('required');
                    input.disabled = true;
                }
            });
        }

        paymentModeSelect.addEventListener('change', function () {
            hideAllFields();
            var mode = this.value;
            var fields = fieldMap[mode] || [];

            // Disable all seamless inputs so they don't submit
            allSeamlessFields.forEach(function (field) {
                var input = field.querySelector('input');
                if (input) {
                    input.disabled = true;
                }
            });

            fields.forEach(function (fieldId) {
                var field = document.getElementById(fieldId);
                if (field) {
                    field.classList.add('visible');
                    var input = field.querySelector('input');
                    if (input) {
                        input.disabled = false;
                        if (input.id !== 'upi_qr' && input.id !== 'pay_later_app' && input.id !== 'request_mode') {
                            input.setAttribute('required', 'required');
                        }
                    }
                }
            });
        });

        // Auto-format expiry date: insert / after MM
        document.getElementById('card_expiry_date').addEventListener('input', function (e) {
            var val = this.value.replace(/[^0-9]/g, '');
            if (val.length >= 2) {
                this.value = val.substring(0, 2) + '/' + val.substring(2, 4);
            } else {
                this.value = val;
            }
        });

        // Restrict card number to digits only
        document.getElementById('card_number').addEventListener('input', function () {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // Restrict CVV to digits only
        document.getElementById('card_cvv').addEventListener('input', function () {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>

</html>
