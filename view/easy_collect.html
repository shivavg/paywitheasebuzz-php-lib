<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Easy Collect API</title>
    <style>
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-label {
            color: #000;
            font-size: 0.9em;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #4CAF50;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            align-items: center;
            padding: 5px 0;
        }

        .checkbox-group label {
            font-size: 1em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            min-width: auto;
        }
    </style>
</head>

<body>
    <div class="grid-container">
        <header class="wrapper">
            <div class="logo">
                <a href="../index.html">
                    <img src="../assets/images/Easebuzz_Logo_ White_Text.svg" alt="Easebuzz">
                </a>
            </div>
            <div class="hedding">
                <h2>
                    <span style="margin-right:20px;">
                        <span class="toggle-container" style="display:inline-flex;">
                            <span class="toggle-label">Auto Fill Data</span>
                            <label class="switch">
                                <input type="checkbox" id="autoFillToggle">
                                <span class="slider"></span>
                            </label>
                        </span>
                    </span>
                    <a class="highlight" href="../index.html">Back</a>
                </h2>
            </div>
        </header>

        <div class="form-container">
            <h2><a href="https://docs.easebuzz.in/docs/payment-gateway/xnp0bvcy0ywmn-easy-collect"
                    target="_blank" style="color:#000;text-decoration:none;"
                    onmouseover="this.style.textDecoration='underline'"
                    onmouseout="this.style.textDecoration='none'">EASY COLLECT API &#x2197;</a></h2>
            <hr>
            <form name="easyCollectForm" method="POST" action="../easebuzz.php?api_name=easy_collect">
                <div class="main-form">
                    <h3>Mandatory Parameters</h3>
                    <hr>
                    <div class="mandatory-data">
                        <div class="form-field">
                            <label for="name">Customer Name<sup>*</sup></label>
                            <input id="name" name="name" placeholder="John Doe" required
                                pattern="^[a-zA-Z0-9&amp;'\-._ ()/,@]{1,150}$"
                                title="Only alphanumeric and &amp;'-._()/,@ allowed. Max 150 chars.">
                        </div>

                        <div class="form-field">
                            <label for="phone">Phone<sup>*</sup></label>
                            <input id="phone" name="phone" placeholder="9876543210" required
                                pattern="^(\+\d{1,4}[-]?)?\d{5,20}$"
                                title="Valid phone number. 5-20 digits, optional country code.">
                        </div>

                        <div class="form-field">
                            <label for="amount">Amount<sup>(should be float)*</sup></label>
                            <input id="amount" name="amount" placeholder="125.25" required
                                title="Amount must be a number with decimal (e.g., 125.0). Must be >= 1.">
                        </div>
                    </div>

                    <h3>Optional Parameters</h3>
                    <hr>

                    <h4 style="color:#555;margin-top:15px;">Link Details</h4>
                    <div class="optional-data">
                        <div class="form-field">
                            <label for="email">Email ID</label>
                            <input id="email" name="email" type="email" placeholder="customer@example.com"
                                title="Enter a valid email address.">
                        </div>

                        <div class="form-field">
                            <label for="merchant_txn">Merchant Transaction ID</label>
                            <input id="merchant_txn" name="merchant_txn" placeholder="ECTEST001"
                                pattern="^[a-zA-Z0-9_|\-/]{1,40}$"
                                title="Only alphanumeric, _, |, -, / allowed. Max 40 chars.">
                        </div>

                        <div class="form-field">
                            <label for="message">Message</label>
                            <input id="message" name="message" placeholder="Payment for order #123">
                        </div>

                        <div class="form-field">
                            <label for="expiry_date">Expiry Date</label>
                            <input id="expiry_date" name="expiry_date"
                                placeholder="DD-MM-YYYY or DD-MM-YYYY HH:MM:SS AM/PM">
                        </div>
                    </div>

                    <h4 style="color:#555;margin-top:15px;">UDF (User Defined Fields)</h4>
                    <div class="optional-data">
                        <div class="form-field">
                            <label for="udf1">UDF1</label>
                            <input id="udf1" name="udf1" placeholder="User description1"
                                pattern="^[a-zA-Z.0-9/\\,\s_#@\-=+&amp;]{1,300}$"
                                title="Only alphanumeric and ./,_#@-=+&amp; allowed. Max 300 chars.">
                        </div>

                        <div class="form-field">
                            <label for="udf2">UDF2</label>
                            <input id="udf2" name="udf2" placeholder="User description2"
                                pattern="^[a-zA-Z.0-9/\\,\s_#@\-=+&amp;]{1,300}$"
                                title="Only alphanumeric and ./,_#@-=+&amp; allowed. Max 300 chars.">
                        </div>

                        <div class="form-field">
                            <label for="udf3">UDF3</label>
                            <input id="udf3" name="udf3" placeholder="User description3"
                                pattern="^[a-zA-Z.0-9/\\,\s_#@\-=+&amp;]{1,300}$"
                                title="Only alphanumeric and ./,_#@-=+&amp; allowed. Max 300 chars.">
                        </div>

                        <div class="form-field">
                            <label for="udf4">UDF4</label>
                            <input id="udf4" name="udf4" placeholder="User description4"
                                pattern="^[a-zA-Z.0-9/\\,\s_#@\-=+&amp;]{1,300}$"
                                title="Only alphanumeric and ./,_#@-=+&amp; allowed. Max 300 chars.">
                        </div>

                        <div class="form-field">
                            <label for="udf5">UDF5</label>
                            <input id="udf5" name="udf5" placeholder="User description5"
                                pattern="^[a-zA-Z.0-9/\\,\s_#@\-=+&amp;]{1,300}$"
                                title="Only alphanumeric and ./,_#@-=+&amp; allowed. Max 300 chars.">
                        </div>
                    </div>

                    <h4 style="color:#555;margin-top:15px;">Operation (Notification Channels)</h4>
                    <div class="optional-data">
                        <div class="form-field">
                            <label>Send Notification Via:</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" name="op_sms"> SMS</label>
                                <label><input type="checkbox" name="op_email"> Email</label>
                                <label><input type="checkbox" name="op_whatsapp"> WhatsApp</label>
                            </div>
                        </div>
                    </div>

                    <h4 style="color:#555;margin-top:15px;">General</h4>
                    <div class="optional-data">
                        <div class="form-field">
                            <label for="update">Update Link</label>
                            <input id="update" name="update" placeholder="true">
                        </div>

                        <div class="form-field">
                            <label for="accept_partial_payment">Accept Partial Payment</label>
                            <input id="accept_partial_payment" name="accept_partial_payment"
                                placeholder="true">
                        </div>

                        <div class="form-field">
                            <label for="split_percentage">Split Percentage</label>
                            <input id="split_percentage" name="split_percentage"
                                placeholder='{"label_of_bank1": 60, "label_of_bank2": 40}'>
                        </div>

                        <div class="form-field">
                            <label for="split_payments">Split Payments</label>
                            <input id="split_payments" name="split_payments"
                                placeholder='{"label_of_bank1": 60, "label_of_bank2": 40}'>
                        </div>

                        <div class="form-field">
                            <label for="sub_merchant_id">Sub-Merchant ID</label>
                            <input id="sub_merchant_id" name="sub_merchant_id" placeholder="S123ABC"
                                pattern="^[a-zA-Z0-9\-]{0,15}$">
                        </div>
                    </div>

                    <div class="btn-submit">
                        <button type="submit">SUBMIT</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="../assets/js/form-validation.js"></script>
    <script>
        document.getElementById('autoFillToggle').addEventListener('change', function () {
            var form = document.forms['easyCollectForm'];
            if (this.checked) {
                form.name.value = 'John Doe';
                form.phone.value = '9876543210';
                form.amount.value = '100.00';
                form.email.value = 'test@example.com';
                form.merchant_txn.value = 'EC' + Math.random().toString(36).substring(2, 10).toUpperCase();
                form.message.value = 'Payment link for order';
            } else {
                var inputs = form.querySelectorAll('input:not([type="checkbox"])');
                for (var i = 0; i < inputs.length; i++) {
                    inputs[i].value = '';
                }
                var checkboxes = form.querySelectorAll('input[type="checkbox"]');
                for (var i = 0; i < checkboxes.length; i++) {
                    if (checkboxes[i].id !== 'autoFillToggle') {
                        checkboxes[i].checked = false;
                    }
                }
            }
        });
    </script>
</body>

</html>
